name: photos
backend:
  vm: media01
ingress_routes:
  - name: web
    hostname: photos.fearn.cloud
    published_port: 2284
    exposure: lan_only
    tls: letsencrypt_dns
    auth:
      type: none
deploy:
  type: quadlet
  containers:
    - name: server
      image: ghcr.io/immich-app/immich-server:v1.120.0
      published_ports:
        - container: 2284
