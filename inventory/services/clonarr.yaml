name: clonarr
service_group: media
service_network: media
service_data_owner:
  uid: 1001
  gid: 1001
backend:
  vm: media-vm
ingress_routes:
  - name: web
    hostname: clonarr.fearn.cloud
    published_port: 6060
    exposure: lan_only
    tls: letsencrypt_dns
    auth:
      type: none
deploy:
  type: quadlet
  containers:
    - name: clonarr
      image: ghcr.io/prophetse7en/clonarr:v3.2.1
      published_ports:
        - bind: 0.0.0.0
          host: 6060
          container: 6060
      env:
        PUID: 1001
        PGID: 1001
        TZ: UTC
      volumes:
        - service_path: config
          container: /config
          access: read_write
