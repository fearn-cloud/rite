name: searxng
service_group: search
service_network: search
service_data_owner:
  uid: 1000
  gid: 1000
backend:
  vm: search-vm
ingress_routes:
  - name: web
    hostname: search.fearn.cloud
    published_port: 8080
    exposure: lan_only
    tls: letsencrypt_dns
    auth:
      type: none
deploy:
  type: quadlet
  containers:
    - name: searxng
      image: ghcr.io/searxng/searxng:2026.6.11-4dd0bf486
      depends_on: [valkey]
      published_ports:
        - bind: 0.0.0.0
          host: 8080
          container: 8080
      env:
        SEARXNG_BASE_URL: https://search.fearn.cloud/
        SEARXNG_LIMITER: true
      volumes:
        - service_path: config
          container: /etc/searxng
          access: read_write
        - service_path: cache
          container: /var/cache/searxng
          access: read_write
    - name: valkey
      image: docker.io/valkey/valkey:9-alpine
      volumes:
        - service_path: valkey
          container: /data
          access: read_write
