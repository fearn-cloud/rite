name: media-file-browser
service_group: media
service_network: media
service_data_owner:
  uid: 1001
  gid: 1001
backend:
  vm: media-vm
ingress_routes:
  - name: web
    hostname: media-files.fearn.cloud
    published_port: 8082
    exposure: lan_only
    tls: letsencrypt_dns
    auth:
      type: none
    directory_entry:
      enabled: true
      label: Media Files
      group: Media
deploy:
  type: quadlet
  containers:
    - name: server
      image: docker.io/filebrowser/filebrowser:v2.63.15
      published_ports:
        - bind: 0.0.0.0
          host: 8082
          container: 8080
      volumes:
        - mount: media
          source: /
          container: /srv
          access: read_write
        - service_path: database
          container: /database
          access: read_write
        - service_path: config
          container: /config
          access: read_write
