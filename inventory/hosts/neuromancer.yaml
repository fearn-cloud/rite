proxmox:
  pve_node_name: neuromancer
  endpoint: http://10.10.0.13:8006
  # endpoint: https://neuromancer.fearn.cloud:8006
  templates:
    - debian-13-base
  custom_roles:
    - name: FortressTofuMapping
      privileges: [Mapping.Audit, Mapping.Modify, Mapping.Use]
  users:
    - name: tofu@pve
      roles: [PVEVMAdmin, PVEDatastoreAdmin, PVESDNAdmin, FortressTofuMapping]
      tokens:
        - id: tofu
          roles: [PVEVMAdmin, PVEDatastoreAdmin, PVESDNAdmin, FortressTofuMapping]
hardware:
  cpu: i7-8700T
  cores: 12
  memory_gb: 32
  storage:
    - name: local-lvm
      kind: lvmthin
    - name: local
      kind: directory
    - name: fast
      kind: zfs
network:
  management_address: 10.10.0.13
  bridges:
    - name: vmbr0
      managed: false
      vlan: 10
      cidr: 10.10.0.13/24
      gateway: 10.10.0.1
ingress:
  proxmox_web_ui:
    enabled: true
    hostname: neuromancer.fearn.cloud
    directory_entry:
      enabled: true
      label: Neuromancer Proxmox
      group: Hosts
gpu_passthrough:
  enabled: true
  vendor: intel
  mode: full
  iommu: intel
  blacklist_host_driver: true
