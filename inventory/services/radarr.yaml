name: radarr
service_group: media
service_network: media
service_data_owner:
  uid: 1001
  gid: 1001
backend:
  vm: media-vm
ingress_routes:
  - name: web
    hostname: radarr.fearn.cloud
    published_port: 7878
    exposure: lan_only
    tls: letsencrypt_dns
    auth:
      type: none
deploy:
  type: quadlet
  containers:
    - name: radarr
      image: lscr.io/linuxserver/radarr:6.2.1.10461-ls306
      published_ports:
        - bind: 0.0.0.0
          host: 7878
          container: 7878
      env:
        PUID: 1001
        PGID: 1001
        TZ: UTC
      volumes:
        - service_path: config
          container: /config
          access: read_write
        - mount: media
          source: /
          container: /data
          access: read_write
