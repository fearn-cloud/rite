- name: Install NFS client utilities
  ansible.builtin.apt:
    name: nfs-common
    state: present
    update_cache: true
  when:
    - (fortress_vm.mounts | default([]) | selectattr('protocol', 'equalto', 'nfs') | list) | length > 0
    - not (fortress_skip_nfs_client_install | default(false))

- name: Ensure systemd unit directory exists
  ansible.builtin.file:
    path: "{{ fortress_systemd_unit_dir | default('/etc/systemd/system') }}"
    state: directory
    mode: "0755"
  when: (fortress_vm.mounts | default([]) | selectattr('protocol', 'equalto', 'nfs') | list) | length > 0

- name: Check active NFS mount points
  ansible.builtin.command:
    cmd: "findmnt --noheadings --target {{ item.mount_point }}"
  changed_when: false
  failed_when: false
  loop: "{{ fortress_vm.mounts | default([]) | selectattr('protocol', 'equalto', 'nfs') | list }}"
  loop_control:
    label: "{{ item.mount_point }}"
  register: fortress_nfs_mount_point_checks

- name: Ensure unmounted NFS mount points exist
  ansible.builtin.file:
    path: "{{ item.item.mount_point }}"
    state: directory
    mode: "0755"
  loop: "{{ fortress_nfs_mount_point_checks.results | default([]) }}"
  loop_control:
    label: "{{ item.item.mount_point }}"
  when: item.rc != 0

- name: Render NFS systemd mount units
  ansible.builtin.template:
    src: nfs.mount.j2
    dest: "{{ fortress_systemd_unit_dir | default('/etc/systemd/system') }}/{{ item.mount_point | fortress_systemd_mount_unit }}"
    mode: "0644"
  loop: "{{ fortress_vm.mounts | default([]) | selectattr('protocol', 'equalto', 'nfs') | list }}"
  loop_control:
    label: "{{ item.mount_point }}"
  register: fortress_nfs_unit_templates

- name: Enable and start NFS mount units
  ansible.builtin.systemd:
    name: "{{ item.item.mount_point | fortress_systemd_mount_unit }}"
    daemon_reload: true
    enabled: true
    state: started
  loop: "{{ fortress_nfs_unit_templates.results | default([]) }}"
  loop_control:
    label: "{{ item.item.mount_point }}"
  register: fortress_nfs_mount_start
  until: fortress_nfs_mount_start is succeeded
  retries: "{{ fortress_nfs_mount_start_retries | default(6) }}"
  delay: "{{ fortress_nfs_mount_start_delay | default(10) }}"
  when: (fortress_systemd_unit_dir | default('/etc/systemd/system')) == '/etc/systemd/system'
