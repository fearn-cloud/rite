name: prowlarr
service_group: media
service_network: media
service_data_owner:
  uid: 1001
  gid: 1001
backend:
  vm: media-vm
ingress_routes:
  - name: web
    hostname: prowlarr.fearn.cloud
    published_port: 9696
    exposure: lan_only
    tls: letsencrypt_dns
    auth:
      type: none
    directory_entry:
      enabled: true
      label: Prowlarr
      group: Media
deploy:
  type: quadlet
  containers:
    - name: prowlarr
      image: lscr.io/linuxserver/prowlarr:2.4.0.5397-ls149
      published_ports:
        - bind: 0.0.0.0
          host: 9696
          container: 9696
      env:
        PUID: 1001
        PGID: 1001
        TZ: UTC
      volumes:
        - service_path: config
          container: /config
          access: read_write
