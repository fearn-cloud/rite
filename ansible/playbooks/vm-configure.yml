- name: Configure VM after first boot
  hosts: vms
  gather_facts: false
  become: true
  tasks:
    - name: Wait for SSH readiness
      ansible.builtin.wait_for_connection:
        timeout: 600

    - name: Wait for cloud-init completion
      ansible.builtin.command: cloud-init status --wait
      changed_when: false

    - name: Converge declared VM network addresses
      ansible.builtin.include_role:
        name: vm_network_addresses
      tags: [vm_network_addresses]

    - name: Converge Management SSH Policy
      ansible.builtin.include_role:
        name: management_ssh_policy
      when: fortress_vm.management_ssh_policy is defined
      tags: [management_ssh_policy]

    - name: Configure NFS mount units
      ansible.builtin.include_role:
        name: vm_nfs_mounts
      tags: [vm_nfs_mounts]

    - name: Configure Tailnet Subnet Router
      ansible.builtin.include_role:
        name: tailnet_subnet_router
      when: fortress_vm.tailnet_subnet_router is defined
      tags: [tailnet_subnet_router]

    - name: Configure VM baseline collectors
      ansible.builtin.include_role:
        name: vm_baseline_collectors
      tags: [vm_baseline_collectors]

    - name: Configure VM PCI Device Assignment support
      ansible.builtin.include_role:
        name: vm_pci_device_assignment
      tags: [vm_pci_device_assignment]

    - name: Finalize VM admin user
      ansible.builtin.include_role:
        name: vm_admin_user
      tags: [vm_admin_user]
