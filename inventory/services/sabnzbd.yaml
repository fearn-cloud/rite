name: sabnzbd
service_group: download
service_network: download
service_data_owner:
  uid: 1001
  gid: 1001
backend:
  vm: download-vm
ingress_routes:
  - name: web
    hostname: sabnzbd.fearn.cloud
    published_port: 8081
    exposure: lan_only
    tls: letsencrypt_dns
    auth:
      type: none
    directory_entry:
      enabled: true
      label: SABnzbd
      group: Download
deploy:
  type: quadlet
  containers:
    - name: sabnzbd
      image: lscr.io/linuxserver/sabnzbd:5.0.3-ls254
      published_ports:
        - bind: 0.0.0.0
          host: 8081
          container: 8080
      env:
        PUID: 1001
        PGID: 1001
        TZ: UTC
      volumes:
        - service_path: config
          container: /config
          access: read_write
        - mount: media
          source: usernet
          container: /data/usernet
          access: read_write
