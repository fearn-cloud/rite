- name: Start Service container
  block:
    - name: Start Service container unit
      ansible.builtin.command:
        cmd: "systemctl start {{ item }}"
  rescue:
    - name: Report failed Service container start
      ansible.builtin.fail:
        msg: >-
          Failed to start {{ item }} for Service {{ deploy_service }}.
          Run systemctl status {{ item }} and journalctl -u {{ item }} on Backend VM
          {{ deploy_service_backend_vm }} for details. Rollback is an explicit operator action.
