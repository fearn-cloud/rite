---
- name: Create tofu PVE API token
  hosts: all
  gather_facts: false
  become: true
  tasks:
    - name: Ensure tofu PVE user exists
      ansible.builtin.command:
        cmd: "pveum user add {{ token_user }}"
      register: host_token_create_user
      changed_when: host_token_create_user.rc == 0
      failed_when: host_token_create_user.rc not in [0, 255]

    - name: Create tofu PVE API token
      ansible.builtin.command:
        cmd: "pveum user token add {{ token_user }} {{ token_id }} --output-format json"
      register: host_token_create_token
      changed_when: true

    - name: Write tofu token value to operator temp file
      ansible.builtin.copy:
        content: "{{ (host_token_create_token.stdout | from_json).value }}"
        dest: "{{ token_output_file }}"
        mode: "0600"
      delegate_to: localhost
      become: false
