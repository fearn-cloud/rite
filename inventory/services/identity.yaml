name: identity
service_group: identity
service_network: identity
service_data_owner:
  uid: 1000
  gid: 1000
backend:
  vm: identity-vm
ingress_routes:
  - name: web
    hostname: auth.fearn.cloud
    published_port: 9000
    exposure: lan_only
    tls: letsencrypt_dns
    auth:
      type: none
deploy:
  type: quadlet
  containers:
    - name: postgres
      image: docker.io/library/postgres:16
      env:
        POSTGRES_DB: authentik
        POSTGRES_USER: authentik
      secrets:
        - secret: secrets.postgres_password
          env: POSTGRES_PASSWORD_FILE
      volumes:
        - service_path: postgres
          container: /var/lib/postgresql/data
          access: read_write
    - name: redis
      image: docker.io/library/redis:7
    - name: server
      image: ghcr.io/goauthentik/server:2025.4.1
      depends_on: [postgres, redis]
      published_ports:
        - bind: 0.0.0.0
          host: 9000
          container: 9000
      env:
        AUTHENTIK_POSTGRESQL__HOST: postgres
        AUTHENTIK_POSTGRESQL__USER: authentik
        AUTHENTIK_POSTGRESQL__NAME: authentik
        AUTHENTIK_REDIS__HOST: redis
      secrets:
        - secret: secrets.secret_key
          env: AUTHENTIK_SECRET_KEY_FILE
        - secret: secrets.postgres_password
          env: AUTHENTIK_POSTGRESQL__PASSWORD_FILE
      volumes:
        - service_path: media
          container: /media
          access: read_write
        - service_path: templates
          container: /templates
          access: read_write
    - name: worker
      image: ghcr.io/goauthentik/server:2025.4.1
      depends_on: [postgres, redis]
      env:
        AUTHENTIK_POSTGRESQL__HOST: postgres
        AUTHENTIK_POSTGRESQL__USER: authentik
        AUTHENTIK_POSTGRESQL__NAME: authentik
        AUTHENTIK_REDIS__HOST: redis
      secrets:
        - secret: secrets.secret_key
          env: AUTHENTIK_SECRET_KEY_FILE
        - secret: secrets.postgres_password
          env: AUTHENTIK_POSTGRESQL__PASSWORD_FILE
      volumes:
        - service_path: media
          container: /media
          access: read_write
        - service_path: templates
          container: /templates
          access: read_write
